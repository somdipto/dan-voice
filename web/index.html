<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>Voice Dani</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main id="app">
    <!-- PIN Entry Screen -->
    <section id="pin-screen" class="screen">
      <div class="pin-header">
        <div class="orb orb--idle" id="orb"></div>
        <h1>Voice Dani</h1>
        <p class="muted">Enter the 6-digit code from your terminal</p>
      </div>
      <div class="pin-input" id="pin-input">
        <input type="tel" maxlength="1" class="pin-digit" data-idx="0" inputmode="numeric" pattern="[0-9]" autocomplete="off" />
        <input type="tel" maxlength="1" class="pin-digit" data-idx="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" />
        <input type="tel" maxlength="1" class="pin-digit" data-idx="2" inputmode="numeric" pattern="[0-9]" autocomplete="off" />
        <input type="tel" maxlength="1" class="pin-digit" data-idx="3" inputmode="numeric" pattern="[0-9]" autocomplete="off" />
        <input type="tel" maxlength="1" class="pin-digit" data-idx="4" inputmode="numeric" pattern="[0-9]" autocomplete="off" />
        <input type="tel" maxlength="1" class="pin-digit" data-idx="5" inputmode="numeric" pattern="[0-9]" autocomplete="off" />
      </div>
      <button id="connect-btn" class="btn btn--primary" disabled>Connect</button>
      <p class="error" id="pin-error" hidden></p>
    </section>

    <!-- Live Chat Screen -->
    <section id="live-screen" class="screen" hidden>
      <div class="live-header">
        <div class="orb orb--idle" id="live-orb"></div>
        <div class="live-info">
          <span class="live-status" id="live-status">Connected</span>
          <span class="live-agent" id="live-agent">Claude</span>
        </div>
        <button id="disconnect-btn" class="btn btn--ghost btn--small">End</button>
      </div>
      <div class="chat" id="chat"></div>
      <div class="input-bar">
        <input type="text" id="text-input" placeholder="Type a message..." autocomplete="off" />
        <button id="send-btn" class="btn btn--icon" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2 21l21-21M17 21V11a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v10"/></svg>
        </button>
      </div>
      <div class="controls">
        <button id="barge-btn" class="btn btn--secondary">Stop</button>
        <button id="new-chat-btn" class="btn btn--ghost">New chat</button>
      </div>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
